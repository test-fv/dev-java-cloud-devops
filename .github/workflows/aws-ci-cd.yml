name: CI/CD con GitHub Actions y AWS

on:
  push:
    branches:
      - dev

env:
  IMAGE_TAG: ${{ github.sha }}
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}

jobs:
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Descargar código
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Autenticación AWS (SIEMPRE primero)
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # 3️⃣ Login oficial a ECR
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 4️⃣ Build imagen Docker
      - name: Build Docker image
        run: |
          docker build -t $ECR_REPOSITORY:$IMAGE_TAG .

      # 5️⃣ Push a ECR
      - name: Push Docker image
        run: |
          docker push $ECR_REPOSITORY:$IMAGE_TAG


  deploy:
    name: Deploy en EC2
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |

            echo "Login a ECR desde EC2..."

            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} \
            | docker login --username AWS --password-stdin \
              $(echo ${{ secrets.ECR_REPOSITORY }} | cut -d'/' -f1)

            echo "Descargando nueva imagen..."
            docker pull ${{ secrets.ECR_REPOSITORY }}:${{ github.sha }}

            echo "Reiniciando contenedor..."
            docker stop demo || true
            docker rm demo || true

            docker run -d \
              --name demo \
              -p 80:8080 \
              ${{ secrets.ECR_REPOSITORY }}:${{ github.sha }}

            echo "Deploy finalizado ✅"