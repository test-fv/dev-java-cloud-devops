name: CI/CD con GitHub Actions y AWS

on:
  push:
    branches:
      - dev

env:
  IMAGE_TAG: ${{ github.sha }}
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # 1️⃣ Primero autenticamos AWS
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # 2️⃣ Login automático a ECR (FORMA OFICIAL)
      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      # 3️⃣ Build & Push
      - name: Build & Push Docker image
        run: |
          docker build -t $ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REPOSITORY:$IMAGE_TAG

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy en EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "Deploying image..."

            # ⚠️ EC2 también necesita login ECR
            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} \
            | docker login --username AWS --password-stdin \
              $(echo ${{ secrets.ECR_REPOSITORY }} | cut -d'/' -f1)

            docker pull ${{ secrets.ECR_REPOSITORY }}:${{ github.sha }}

            docker stop demo || true
            docker rm demo || true

            docker run -d -p 80:8080 --name demo \
              ${{ secrets.ECR_REPOSITORY }}:${{ github.sha }}