name: CI/CD Docker → AWS ECR → EC2

on:
  push:
    branches:
      - dev

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
# =====================================================
# BUILD & PUSH IMAGE TO ECR
# =====================================================
  build:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout código
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Autenticación AWS
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # 3️⃣ Login oficial a ECR (IMPORTANTE)
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 4️⃣ Build + Push usando registry correcto (CLAVE)
      - name: Build, tag and push image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: mi_app_devops   # 👈 nombre EXACTO del repo ECR
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI=$REGISTRY/$REPOSITORY:$IMAGE_TAG

          echo "Building image $IMAGE_URI"

          docker build -t $IMAGE_URI .
          docker push $IMAGE_URI

# =====================================================
# DEPLOY EN EC2
# =====================================================
  deploy:
    name: Deploy to EC2
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |

            REGION="${{ secrets.AWS_REGION }}"
            ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
            REGISTRY="$ACCOUNT_ID.dkr.ecr.$REGION.amazonaws.com"
            IMAGE_URI="$REGISTRY/mi_app_devops:${{ github.sha }}"

            echo "Login to ECR from EC2..."
            aws ecr get-login-password --region $REGION \
            | docker login --username AWS --password-stdin $REGISTRY

            echo "Pull latest image..."
            docker pull $IMAGE_URI

            echo "Restart container..."
            docker stop demo || true
            docker rm demo || true

            docker run -d \
              --name demo \
              -p 80:8080 \
              $IMAGE_URI

            echo "Deploy completed ✅"