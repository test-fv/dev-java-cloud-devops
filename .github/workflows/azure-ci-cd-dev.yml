name: CI/CD → Azure ACR → Azure VM

on:
  push:
    branches:
      - dev

env:
  ACR_NAME: ${{ secrets.ACR_NAME }}
  IMAGE_NAME: portfolioapp

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Obtener código
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Login Azure
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # 3️⃣ Login ACR
      - name: Login to Azure Container Registry
        run: az acr login --name $ACR_NAME

      # 4️⃣ Build Docker image
      - name: Build Docker image
        run: |
          docker build \
            -t $ACR_NAME.azurecr.io/$IMAGE_NAME:${{ github.sha }} \
            -t $ACR_NAME.azurecr.io/$IMAGE_NAME:latest .

      # 5️⃣ Push images
      - name: Push image to ACR
        run: |
          docker push $ACR_NAME.azurecr.io/$IMAGE_NAME:${{ github.sha }}
          docker push $ACR_NAME.azurecr.io/$IMAGE_NAME:latest

      # 6️⃣ Deploy en VM Azure vía SSH
      - name: Deploy on Azure VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            cd ~/app
            ./deploy.sh