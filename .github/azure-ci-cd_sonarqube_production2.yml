name: CI/CD + SonarQube → Azure

on:
  push:
    branches: [dev]

env:
  ACR_NAME: ${{ secrets.ACR_NAME }}
  IMAGE_NAME: portfolioapp

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Setup Java (NECESARIO para Maven)
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: maven

      # 3️⃣ Build + SonarQube (REEMPLAZA scanner genérico)
      - name: Build and Analyze with SonarQube
        run: |
          mvn clean install -DskipTests sonar:sonar \
            -Dsonar.projectKey=portfolioapp \
            -Dsonar.projectName=Portfolio App \
            -Dsonar.host.url=http://${{ secrets.SONAR_HOST }} \
            -Dsonar.login=${{ secrets.SONAR_TOKEN }}

      # 4️⃣ Quality Gate (CLAVE)
      - name: SonarQube Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        continue-on-error: false

      # 5️⃣ Azure Login (solo si pasa calidad)
      - name: Azure Login
        if: success()
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # 6️⃣ Login ACR
      - name: Login to Azure Container Registry
        if: success()
        run: az acr login --name $ACR_NAME

      # 7️⃣ Build Docker image
      - name: Build Docker image
        if: success()
        run: |
          docker build \
            -t $ACR_NAME.azurecr.io/$IMAGE_NAME:${{ github.sha }} \
            -t $ACR_NAME.azurecr.io/$IMAGE_NAME:latest .

      # 8️⃣ Push images
      - name: Push image to ACR
        if: success()
        run: |
          docker push $ACR_NAME.azurecr.io/$IMAGE_NAME:${{ github.sha }}
          docker push $ACR_NAME.azurecr.io/$IMAGE_NAME:latest

      # 9️⃣ Deploy en VM
      - name: Deploy on Azure VM
        if: success()
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            cd ~/app
            ./deploy.sh